<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>annisa space</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
  margin:0; padding:0; box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden;
  background:#000;
  animation:pageFade 1.2s ease;
  padding:40px 0;
  cursor:url("https://cur.cursors-4u.net/cursors/cur-13/cur1160.cur"), auto;
}

/* cinematic grain */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.07;
  pointer-events:none;
  z-index:999;
}

/* background */
.bg{
  position:fixed;
  inset:0;
  background-image:url("bg.jpg");
  background-size:cover;
  background-position:center;
  filter:blur(8px) brightness(0.7);
  transform:scale(1.1);
  z-index:-2;
  transition:transform .2s ease;
}

/* glow */
.glow{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  background:rgba(255,192,203,0.12);
  filter:blur(100px);
  z-index:-3;
  animation:moveGlow 10s infinite alternate ease-in-out;
}

.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,.9));
  z-index:-1;
}

/* floating hearts */
.heart{
  position:fixed;
  color:pink;
  font-size:14px;
  animation:heartFloat linear infinite;
  opacity:.7;
  z-index:-1;
}

@keyframes heartFloat{
  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-120px);
  }
}

/* card */
.card{
  width:340px;
  padding:32px;
  border-radius:28px;
  text-align:center;
  color:#fff;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(24px);
  box-shadow:
    0 10px 60px rgba(255,255,255,.08),
    0 0 40px rgba(255,105,180,.15);
  border:1px solid rgba(255,255,255,0.2);
  animation:fade .9s ease;
  transition:all .35s ease;
  position:relative;
}

/* mirror reflection */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:28px;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.08),
    transparent
  );
  pointer-events:none;
}

.card:hover{
  transform:translateY(-4px);
}

/* profile */
.profile{
  width:120px; height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #fff;
  margin-bottom:14px;
  box-shadow:0 0 25px rgba(255,192,203,.5);
  transition:all .35s ease;
}

.profile:hover{
  transform:scale(1.05) rotate(2deg);
}

/* text */
h1{
  font-size:26px;
  margin-bottom:4px;
  text-shadow:0 0 12px rgba(255,255,255,.4);
}

.bio{
  font-size:14px;
  color:#ddd;
  margin-bottom:18px;
}

/* buttons */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  text-decoration:none;
  padding:12px;
  margin:10px 0;
  border-radius:20px;
  font-weight:500;
  background:#fff;
  color:#000;
  transition:.25s;
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, #ff9ecf, #cdb4ff);
  opacity:0;
  transition:.25s;
  z-index:-1;
}

.btn:hover{
  transform:scale(1.05);
  color:#fff;
  box-shadow:0 0 15px rgba(255,105,180,0.6);
}

.btn:hover::before{
  opacity:1;
}

/* spotify */
.spotify-box{
  margin-top:18px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(255,255,255,0.08);
  position:relative;
}

.spotify-box::before{
  content:"currently playing ♫";
  position:absolute;
  top:-10px;
  left:12px;
  font-size:11px;
  color:#ffd6e7;
  background:rgba(0,0,0,0.4);
  padding:4px 8px;
  border-radius:10px;
  z-index:2;
}

/* visualizer */
.visualizer{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:4px;
  margin-top:14px;
}

.bar{
  width:4px;
  height:18px;
  background:white;
  border-radius:10px;
  animation:bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){
  animation-delay:.2s;
}

.bar:nth-child(3){
  animation-delay:.4s;
}

.bar:nth-child(4){
  animation-delay:.6s;
}

@keyframes bounce{
  0%,100%{
    height:10px;
  }

  50%{
    height:28px;
  }
}

/* music */
.music-btn{
  margin-top:10px;
  padding:8px 16px;
  border:none;
  border-radius:18px;
  background:#fff;
  cursor:pointer;
  transition:all .3s ease;
}

.music-btn:hover{
  transform:scale(1.05);
}

/* quote */
.quote{
  margin-top:14px;
  color:#f7d8e5;
  font-size:12px;
  font-style:italic;
}

/* clock */
.clock{
  margin-top:10px;
  color:#ddd;
  font-size:13px;
  letter-spacing:1px;
}

/* anonymous message */
.message-box{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message-input{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:16px;
  background:rgba(255,255,255,0.12);
  color:white;
  backdrop-filter:blur(10px);
}

.message-input::placeholder{
  color:#ddd;
}

.send-btn{
  padding:10px;
  border:none;
  border-radius:16px;
  background:white;
  color:black;
  cursor:pointer;
  transition:.3s;
  font-weight:500;
}

.send-btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px rgba(255,105,180,0.5);
}

/* popup */
.popup{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  color:white;
  padding:12px 18px;
  border-radius:16px;
  opacity:0;
  transform:translateY(20px);
  transition:.4s;
  z-index:999;
}

.popup.show{
  opacity:1;
  transform:translateY(0);
}

/* sparkles */
.sparkle{
  position:absolute;
  width:6px; height:6px;
  background:#fff;
  border-radius:50%;
  opacity:.7;
  animation:float 6s linear infinite;
}

/* cursor sparkle */
.cursor{
  position:fixed;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  animation:fadeOut 0.8s forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    transform:scale(2);
  }
}

@keyframes float{
  from{ transform:translateY(100vh);}
  to{ transform:translateY(-100px);}
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes pageFade{
  from{
    opacity:0;
    filter:blur(10px);
  }

  to{
    opacity:1;
    filter:blur(0);
  }
}

@keyframes moveGlow{
  from{
    transform:translate(-50px,-30px);
  }

  to{
    transform:translate(50px,30px);
  }
}

/* smooth fade */
.card *{
  animation:smoothIn 1s ease;
}

@keyframes smoothIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* scrollbar */
::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  background:#ffffff55;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="heart" style="left:10%; animation-duration:8s;">❤</div>
<div class="heart" style="left:25%; animation-duration:11s;">❤</div>
<div class="heart" style="left:40%; animation-duration:9s;">❤</div>
<div class="heart" style="left:60%; animation-duration:13s;">❤</div>
<div class="heart" style="left:80%; animation-duration:10s;">❤</div>

<div class="card">

  <img class="profile" src="pfp.jpg">

  <h1>annisa</h1>

  <p class="bio" id="typing"></p>

  <a class="btn" href="https://www.instagram.com/anzhhraa?igsh=MWdkNzQzZG51NGd6aA==" target="_blank">
    <i class="fa-brands fa-instagram"></i> instagram
  </a>

  <a class="btn" href="https://www.tiktok.com/@nissazhhra?_r=1&_t=ZS-960b499ZZZp" target="_blank">
    <i class="fa-brands fa-tiktok"></i> tiktok
  </a>

  <a class="btn" href="https://open.spotify.com/playlist/275BjDZPESy8VYZ2D0aKrc?si=21cc069680c54a86" target="_blank">
    <i class="fa-brands fa-spotify"></i> spotify
  </a>

  <button class="music-btn" onclick="toggleMusic()">play / pause music</button>

  <p class="quote" id="quote"></p>

  <p class="clock" id="clock"></p>

  <div class="spotify-box">
    <iframe style="border-radius:18px"
    src="https://open.spotify.com/embed/playlist/275BjDZPESy8VYZ2D0aKrc?utm_source=generator"
    width="100%"
    height="80"
    frameBorder="0"
    allowfullscreen=""
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <div class="visualizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div class="message-box">

    <input
      type="text"
      class="message-input"
      id="messageInput"
      placeholder="leave an anonymous message..."
    >

    <button class="send-btn" onclick="sendMessage()">
      send message ♡
    </button>

  </div>

</div>

<div class="popup" id="popup">
message sent ♡
</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/8k3c1s.mp3" type="audio/mpeg">
</audio>

<div class="sparkle" style="left:10%; animation-delay:0s;"></div>
<div class="sparkle" style="left:30%; animation-delay:1s;"></div>
<div class="sparkle" style="left:50%; animation-delay:2s;"></div>
<div class="sparkle" style="left:70%; animation-delay:3s;"></div>
<div class="sparkle" style="left:90%; animation-delay:4s;"></div>

<script>

/* typing */
const text = "welcome to my dreamy little space ♡";
let i = 0;

function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

/* music */
function toggleMusic(){
  const m = document.getElementById("music");

  if(m.paused){
    m.play();
  } else {
    m.pause();
  }
}

window.addEventListener("click", ()=>{
  const m = document.getElementById("music");
  m.play().catch(()=>{});
});

/* parallax */
const bg = document.getElementById("bg");

document.addEventListener("mousemove", (e)=>{
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;

  bg.style.transform =
  `scale(1.1) translate(${x}px, ${y}px)`;
});

/* cursor sparkle */
document.addEventListener("mousemove", (e)=>{

  const sparkle =
  document.createElement("div");

  sparkle.className = "cursor";

  sparkle.style.left = e.clientX + "px";
  sparkle.style.top = e.clientY + "px";

  document.body.appendChild(sparkle);

  setTimeout(()=>{
    sparkle.remove();
  },800);

});

/* auto changing quotes */
const quotes = [
  "stay soft but powerful",
  "romanticize your life",
  "pretty mind pretty soul",
  "you are the main character",
  "dreamy but dangerous"
];

let quoteIndex = 0;

function changeQuote(){

  document.getElementById("quote").innerText =
  quotes[quoteIndex];

  quoteIndex =
  (quoteIndex + 1) % quotes.length;

}

changeQuote();

setInterval(changeQuote, 4000);

/* realtime clock */
function updateClock(){

  const now = new Date();

  document.getElementById("clock").innerHTML =
  now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

/* click sound */
const clickAudio = new Audio(
"https://www.myinstants.com/media/sounds/mouse-click.mp3"
);

document.querySelectorAll(
".btn,.music-btn,.send-btn"
).forEach(btn=>{

  btn.addEventListener("click", ()=>{

    clickAudio.currentTime = 0;

    clickAudio.play().catch(()=>{});

  });

});

/* anonymous message */
function sendMessage(){

  const input =
  document.getElementById("messageInput");

  if(input.value.trim() !== ""){

    const popup =
    document.getElementById("popup");

    popup.classList.add("show");

    setTimeout(()=>{
      popup.classList.remove("show");
    },2000);

    input.value = "";

  }

}

</script>

</body>
</html>
